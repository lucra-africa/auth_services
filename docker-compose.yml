services:
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: poruta_auth
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build: .
    ports:
      - "8050:8050"
    volumes:
      - ./keys:/app/keys:ro
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: poruta_auth
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      JWT_SECRET_KEY: dev-secret-change-in-production-minimum-32-chars
      JWT_ALGORITHM: RS256
      JWT_PRIVATE_KEY_PATH: keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: keys/jwt-public.pem
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      FRONTEND_URL: http://localhost:3000
      ADMIN_EMAIL: admin@poruta.com
      ADMIN_PASSWORD: Admin!Poruta2024
      SMTP_HOST: smtp.zoho.com
      SMTP_PORT: "465"
      SMTP_USE_SSL: "true"
      SMTP_USERNAME: support@poruta.com
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: support@poruta.com
      SMTP_FROM_NAME: Poruta
      APP_PORT: "8050"
      APP_DEBUG: "true"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodata:
  miniodata:
