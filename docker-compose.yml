services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: poruta_auth
      POSTGRES_USER: poruta
      POSTGRES_PASSWORD: poruta_dev_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poruta -d poruta_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql+asyncpg://poruta:poruta_dev_password@postgres:5432/poruta_auth
      JWT_SECRET_KEY: dev-secret-change-in-production-minimum-32-chars
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      FRONTEND_URL: http://localhost:3000
      ADMIN_EMAIL: admin@poruta.com
      ADMIN_PASSWORD: Admin!Poruta2024
      APP_PORT: "5000"
      APP_DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
